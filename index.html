<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>test</title>
        <script type='module' src="./js/index.js"></script>
        <style>
            /* タブ */
            .panel {
                display:none;
            }
            .panel.is-show {
                display:block;
            }
            .tab.is-active {
                background-color:blue;
            }

            /* 共通 */
            .w220px {width: 220px;}
            .w120px {width: 120px;}

            /* スキル */
            .skill-table-area {
                margin: auto;
            }

            .skill-table {
                width: 650px;
                height: 200px;
                background-color: blue;
                border-radius: 15px;
                filter: drop-shadow(5px 5px 5px rgba(100, 100, 0, 1));
                display: inline-block;
                padding: 10px 20px;
                margin: 0px 25px;
            }

            .skill-table th {
                text-align: left;
            }

            .skill-table .skill-title {
                width: 650px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <header>

        </header>

        <div id="skill-area" class="skill-table-area">
            <table class="skill-table">
                <thead>
                    <tr>
                        <th class="skill-title" colspan="4">タイトル</th>
                    <tr>
                    <tr>
                        <th class="w220px">技術</th>
                        <th class="w120px">種類</th>
                        <th class="w120px">経験年数</th>
                        <th class="w120px">スキル</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>aaaa1</td>

                    </tr>

                    <tr>
                        <td>aaaa3</td>

                        <td>dddd3</td>
                    </tr>
                    <tr><td colspan="4" style="background-color: red;">コメント</td></tr>
                </tbody>
            </table>
            <table class="skill-table">
                <thead>
                    <tr>
                        <th class="skill-title" colspan="4">タイトル</th>
                    <tr>
                    <tr>
                        <th>技術</th>
                        <th>種類</th>
                        <th>経験年数</th>
                        <th>スキル</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>aaaa1</td>

                    </tr>
                    <tr>
                        <td>aaaa2</td>

                    <tr>
                        <td>aaaa3</td>

                        <td>dddd3</td>
                    </tr>
                    <tr><td colspan="4" style="background-color: red;">コメント</td></tr>
                </tbody>
            </table>
        </div>







        <main style="display:none;">
            タブ
            <ul class="tab_area">
                <li class="tab profile is-active"></li>プロフィール</li>
                <li class="tab skill">スキル</li>
                <li class="tab work">経歴</li>
                <li class="tab contact">お問い合わせ</li>
            </ul>
            <!-- 各画面 -->
            <div class="panel_area">
                <!-- プロフィール -->
                <div class="panel profile is-show">
                    プロフィール
                </div>
                <!-- スキル -->
                <div class="panel skill">
                    スキル
                </div>
                <!-- 経歴 -->
                <div class="panel work">
                    経歴
                </div>
                <!-- お問い合わせ -->
                <div class="panel contact">
                    お問い合わせ
                </div>
            </div>
        </main>
    </body>
</html>
