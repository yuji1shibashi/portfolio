            html, body {

            .w220px {width: 220px;}

            /* タブ */

            }
            .panel.is-show {

            }

                /* background-color:blue; */

            }
            .tab_area {
                margin: 0;

            }

                list-style: none;

            }

            }

            .skill-area {
                width: 90vw;
                margin: 0 auto;
            }

            .skill-row {
                display: flex;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: stretch;
                width: 100%;
                background-color: blue;
            }

            .skill-detail {
                width:48%;
                background-color: red;
                margin: 20px 0px;
            }

            .skill-box {
                display: inline-block;
                width: calc(100% - 125px);
                height: 500px;
                background-color: green;
                vertical-align: top;
